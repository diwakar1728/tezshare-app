workflows:
  android-workflow:
    name: TezShare - Android APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Generate missing Android project files
        script: |
          flutter create . --platforms=android --project-name tezshare --org com.tezshare
      - name: Add required permissions to AndroidManifest.xml
        script: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          PERMISSIONS='    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.CHANGE_WIFI_MULTICAST_STATE"/>\n'
          awk -v perms="$PERMISSIONS" '{print} /<manifest/{print perms}' "$MANIFEST" > tmp_manifest && mv tmp_manifest "$MANIFEST"
          cat "$MANIFEST"
      - name: Bump compileSdk/targetSdk (file_picker needs SDK 36+)
        script: |
          if [ -f android/app/build.gradle.kts ]; then
            echo "--- BEFORE PATCH (build.gradle.kts) ---"
            grep -n "compileSdk\|targetSdk" android/app/build.gradle.kts
            perl -pi -e 's/^(\s*compileSdk\s*=\s*).*$/${1}36/' android/app/build.gradle.kts
            perl -pi -e 's/^(\s*targetSdk\s*=\s*).*$/${1}36/' android/app/build.gradle.kts
            echo "--- AFTER PATCH (build.gradle.kts) ---"
            grep -n "compileSdk\|targetSdk" android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            echo "--- BEFORE PATCH (build.gradle) ---"
            grep -n "compileSdkVersion\|targetSdkVersion" android/app/build.gradle
            perl -pi -e 's/^(\s*compileSdkVersion\s+).*$/${1}36/' android/app/build.gradle
            perl -pi -e 's/^(\s*targetSdkVersion\s+).*$/${1}36/' android/app/build.gradle
            echo "--- AFTER PATCH (build.gradle) ---"
            grep -n "compileSdkVersion\|targetSdkVersion" android/app/build.gradle
          fi
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (release)
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  windows-workflow:
    name: TezShare - Windows EXE
    max_build_duration: 30
    instance_type: windows_x2
    environment:
      flutter: stable
    scripts:
      - name: Generate missing Windows project files
        script: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --project-name tezshare
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Windows app (release)
        script: |
          flutter build windows --release
    artifacts:
      - build/windows/x64/runner/Release/**
