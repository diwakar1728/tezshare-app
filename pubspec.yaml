name: tezshare
description: "TezShare - Fast local file sharing without internet, phone to phone, phone to laptop."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # For running a local HTTP server on the device (to RECEIVE files)
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # For sending files to another device over local network
  http: ^1.2.1

  # To find device's own WiFi IP address
  network_info_plus: ^5.0.3

  # To pick files (images, video, apk, zip, exe, anything)
  file_picker: ^8.0.0+1

  # To find safe folders to save received files
  path_provider: ^2.1.3

  # For runtime permissions (storage etc.)
  permission_handler: ^11.3.1

  # To generate a unique ID for each device
  uuid: ^4.4.0

  # For safely building file paths on any OS
  path: ^1.9.0

  # To get a friendly device name (e.g. "Diwakar's Phone")
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
